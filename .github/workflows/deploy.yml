name: Deploy to GitHub Pages

on:
  # mainブランチにプッシュされた時に実行
  push:
    branches: [main]
  # 手動での実行も許可
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install, build, and upload
        uses: withastro/action@v2
        # ここで自動的に npm install と npm run build が走ります
        # package-manager: pnpm などを使っている場合は適宜変更が必要ですが、通常は自動判別されます

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
